name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build all targets
        run: make all

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/nodeman-darwin-arm64
            dist/nodeman-darwin-amd64
            dist/nodeman-linux-arm64
            dist/nodeman-linux-amd64
            dist/nodeman-windows-amd64.exe
